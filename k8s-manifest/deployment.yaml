apiVersion: apps/v1
kind: Deployment
metadata:
  name: vite
  namespace: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: vite
        image: 8076381912/argocd:v1
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: my-app
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30084
  selector:
    app: nginx

